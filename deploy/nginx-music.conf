# /etc/nginx/sites-available/music.yongle.school
# 反代到 serve.mjs (127.0.0.1:8080)。子域名继承 yongle.school 的 ICP 备案。
# 先用这份 80 端口版给 certbot 签证书；签完 certbot 会自动补 443 + 跳转。

server {
    listen 80;
    server_name music.yongle.school;

    # AI 作曲(尤其长曲)可能要几十秒，放宽超时
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    client_max_body_size 20m;      # 允许作品音频上传(将来)

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
